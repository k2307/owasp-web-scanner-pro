<!DOCTYPE html>
<html>
<head>
<title>Results</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
<h1>Scan Summary</h1>
<div class="summary">
<div>High: {{ high }}</div>
<div>Medium: {{ medium }}</div>
<div>Low: {{ low }}</div>
</div>
{% for issue in issues %}
<div class="card {{ issue.severity }}">
<h3>{{ issue.title }}</h3>
<p><b>Severity:</b> {{ issue.severity }}</p>
<p>{{ issue.description }}</p>
<p><b>Fix:</b> {{ issue.remediation }}</p>
</div>
{% endfor %}
<br>
<a class="btn" href="/download/{{ report }}">Download PDF</a>
</div>
</body>
</html>
